<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathCode Startup Project — IT Монополи</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Arial Black',Arial,sans-serif;background:linear-gradient(135deg,#7B2FBE 0%,#C85FA0 50%,#F0873A 100%);min-height:100vh;padding:12px}
#app{display:flex;flex-direction:column;align-items:center;gap:12px}

/* ── LOBBY ── */
#lobby{display:flex;flex-direction:column;align-items:center;gap:18px;padding:40px 36px;background:rgba(255,255,255,0.15);border-radius:24px;min-width:360px;backdrop-filter:blur(4px)}
#lobby h1{font-size:28px;font-weight:900;color:#fff;text-align:center;text-shadow:2px 2px 0 #7B2FBE}
#lobby h2{font-size:13px;color:#ffe0f0;font-weight:400;text-align:center;margin-top:-10px}
.l-row{display:flex;align-items:center;gap:10px;width:100%}
.l-row label{font-size:13px;color:#fff;min-width:120px;font-weight:700}
.l-row input{font-size:13px;padding:7px 12px;border:2px solid rgba(255,255,255,0.4);border-radius:10px;background:rgba(255,255,255,0.2);color:#fff;outline:none;flex:1}
.l-row input::placeholder{color:rgba(255,255,255,0.55)}
.room-code-display{font-size:36px;font-weight:900;letter-spacing:8px;color:#F5C518;text-shadow:2px 2px 0 #1a1a1a;text-align:center;background:rgba(0,0,0,0.2);padding:12px 24px;border-radius:14px;width:100%}
.btn-yellow{padding:11px 30px;background:#F5C518;color:#1a1a1a;border:none;border-radius:14px;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 #c49a00;width:100%}
.btn-yellow:hover{background:#ffd740}
.btn-yellow:disabled{background:#aaa;box-shadow:0 4px 0 #888;cursor:not-allowed}
.btn-purple{padding:11px 30px;background:#7B2FBE;color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 #5a1a9a;width:100%}
.btn-purple:hover{background:#9c4dcc}
#lobby-players{display:flex;flex-direction:column;gap:6px;width:100%}
.lobby-player{background:rgba(255,255,255,0.2);border-radius:10px;padding:8px 14px;font-size:13px;color:#fff;font-weight:700}
#lobby-status{font-size:12px;color:#ffe0f0;text-align:center;min-height:18px}
#error-msg{font-size:12px;color:#ffb3b3;text-align:center;min-height:18px;font-weight:700}
.divider{width:100%;height:1px;background:rgba(255,255,255,0.2)}
#or-text{font-size:12px;color:rgba(255,255,255,0.6);text-align:center}

/* ── GAME ── */
#game-area{display:none;gap:14px;width:100%;justify-content:center;align-items:flex-start}
#game-area.active{display:flex}
#board-wrap{position:relative;width:960px;height:960px;flex-shrink:0}
#board{width:960px;height:960px;display:grid;grid-template-columns:140px repeat(9,75.6px) 140px;grid-template-rows:140px repeat(9,75.6px) 140px;border:3px solid #1a1a1a;border-radius:4px;overflow:hidden}
.cell{border:1.5px solid rgba(0,0,0,0.35);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;position:relative;cursor:pointer;padding:3px 2px;background:rgba(220,160,210,0.55);overflow:hidden;transition:filter 0.15s}
.cell:hover{filter:brightness(1.15)}
.cell.corner{background:rgba(200,130,180,0.7);justify-content:center}
.color-bar-top{width:100%;height:22px;flex-shrink:0;border-bottom:2px solid rgba(0,0,0,0.2)}
.color-bar-bottom{width:100%;height:22px;flex-shrink:0;border-top:2px solid rgba(0,0,0,0.2);margin-top:auto}
.color-bar-left{height:100%;width:18px;flex-shrink:0;border-right:2px solid rgba(0,0,0,0.2);position:absolute;left:0;top:0}
.color-bar-right{height:100%;width:18px;flex-shrink:0;border-left:2px solid rgba(0,0,0,0.2);position:absolute;right:0;top:0}
.cell-name{font-size:9px;line-height:1.25;color:#1a1a1a;font-weight:800;padding:2px 3px;flex:1;word-break:break-word}
.cell-price{font-size:8px;color:#5a1a9a;font-weight:900;background:#F5C518;border-radius:6px;padding:2px 5px;margin-bottom:2px}
.cell-mc{font-size:6.5px;color:#F0873A;font-weight:900;letter-spacing:0.5px;margin-bottom:1px}
.cell.corner .cell-name{font-size:10px;font-weight:900;color:#1a1a1a;line-height:1.3}
.cell.chance{background:rgba(245,197,24,0.45)}
.cell.chest{background:rgba(100,180,255,0.45)}
.cell.tax{background:rgba(120,230,120,0.45)}
.cell.railroad{background:rgba(180,140,255,0.5)}
.cell.utility{background:rgba(100,220,200,0.5)}
#center{position:absolute;top:140px;left:140px;width:680px;height:680px;display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;background:linear-gradient(135deg,rgba(123,47,190,0.6),rgba(200,95,160,0.55),rgba(240,135,58,0.5));padding:14px;gap:4px}
#logo .l1{font-size:26px;font-weight:900;color:#fff;text-shadow:3px 3px 0 #7B2FBE;display:block;transform:rotate(-4deg);letter-spacing:1px;text-align:center}
#logo .l2{font-size:14px;font-weight:900;color:#F5C518;text-shadow:1px 1px 0 #c49a00;display:block;transform:rotate(-4deg);letter-spacing:2px;text-align:center}
#players-area{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;width:100%}
.pcard{border:2.5px solid var(--pc);border-radius:12px;padding:6px 10px;min-width:114px;background:rgba(255,255,255,0.9);transition:transform 0.2s,box-shadow 0.2s}
.pcard.active-player{transform:scale(1.08);box-shadow:0 0 14px var(--pc)}
.pcard-name{font-size:11px;font-weight:900;color:var(--pc)}
.pcard-money{font-size:13px;font-weight:700;color:#1a1a1a}
.pcard-money span{color:#F0873A;font-size:9px;font-weight:900}
.pcard-pos{font-size:7.5px;color:#666;margin-top:2px}
#dice-row{display:flex;gap:14px;align-items:center}
.die{width:52px;height:52px;border:3px solid #1a1a1a;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#1a1a1a}
.die.rolling{animation:rollAnim 0.4s ease}
@keyframes rollAnim{0%{transform:rotate(0)scale(1)}25%{transform:rotate(-15deg)scale(1.2)}75%{transform:rotate(15deg)scale(1.2)}100%{transform:rotate(0)scale(1)}}
#roll-btn{padding:10px 26px;background:#F5C518;color:#1a1a1a;border:none;border-radius:14px;font-size:14px;cursor:pointer;font-weight:900;box-shadow:0 4px 0 #c49a00}
#roll-btn:hover{background:#ffd740}
#roll-btn:disabled{background:#aaa;box-shadow:none;cursor:not-allowed}
#turn-label{font-size:13px;color:#fff;font-weight:700;text-align:center;text-shadow:1px 1px 0 #7B2FBE}
#prop-info{font-size:10px;color:#fff;text-align:center;min-height:16px;font-weight:700;line-height:1.4}
#buy-bar{display:flex;gap:8px;justify-content:center}
#buy-btn{padding:7px 14px;background:#F0873A;color:#fff;border:none;border-radius:10px;font-size:11px;cursor:pointer;font-weight:900;display:none}
#skip-btn{padding:7px 14px;background:#546e7a;color:#fff;border:none;border-radius:10px;font-size:11px;cursor:pointer;font-weight:900;display:none}
#end-box{display:none;flex-direction:column;align-items:center;gap:8px}
#end-box h2{font-size:18px;color:#F5C518;font-weight:900;text-shadow:2px 2px 0 #1a1a1a;text-align:center}
#restart-btn{padding:8px 20px;background:#F5C518;color:#1a1a1a;border:none;border-radius:10px;font-size:12px;cursor:pointer;font-weight:900}
.pawn{position:absolute;width:20px;height:20px;border-radius:50%;border:2.5px solid #fff;font-size:11px;display:flex;align-items:center;justify-content:center;z-index:10;pointer-events:none;box-shadow:0 2px 6px rgba(0,0,0,0.5);transition:left 0.3s,top 0.3s}
#log-panel{width:290px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;align-self:stretch}
#log-title{font-size:14px;font-weight:900;color:#fff;text-shadow:1px 1px 0 #7B2FBE}
#log{flex:1;min-height:420px;max-height:720px;overflow-y:auto;font-size:11px;color:#fff;background:rgba(0,0,0,0.3);border-radius:14px;padding:10px 12px;border:2px solid rgba(255,255,255,0.2);line-height:1.6}
#log p{margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.1)}
#my-turn-banner{display:none;position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#F5C518;color:#1a1a1a;font-size:16px;font-weight:900;padding:10px 28px;border-radius:14px;box-shadow:0 4px 16px rgba(0,0,0,0.3);z-index:200;animation:bannerPop 0.4s ease}
@keyframes bannerPop{0%{transform:translateX(-50%)scale(0.7)}100%{transform:translateX(-50%)scale(1)}}
/* Modal */
#modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);z-index:100;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
#modal-box{background:linear-gradient(160deg,#C85FA0,#F0873A);border-radius:24px;padding:28px 24px;min-width:290px;max-width:350px;display:flex;flex-direction:column;align-items:center;gap:14px;border:3px solid #1a1a1a;box-shadow:0 8px 32px rgba(0,0,0,0.45)}
#modal-icon-wrap{display:block;margin:0 auto}
#modal-name{font-size:20px;font-weight:900;color:#1a1a1a;text-align:center;line-height:1.2}
#modal-price{font-size:26px;font-weight:900;color:#F5C518;text-shadow:2px 2px 0 #1a1a1a}
#modal-coins{font-size:12px;font-weight:900;color:#1a1a1a;letter-spacing:1px;margin-top:-10px}
#modal-desc{font-size:11px;color:#fff;text-align:center;font-weight:700;background:rgba(0,0,0,0.2);border-radius:8px;padding:8px 12px;line-height:1.5;width:100%}
#modal-rent{font-size:10px;color:rgba(255,255,255,0.85);text-align:center}
#modal-owner{font-size:11px;color:#fff;font-weight:700}
#modal-close{padding:9px 26px;background:#F5C518;color:#1a1a1a;border:none;border-radius:12px;font-size:14px;font-weight:900;cursor:pointer}
</style>
</head>
<body>
<div id="app">

<!-- LOBBY -->
<div id="lobby">
  <h1>MathCode<br>Startup Project</h1>
  <h2>IT Монополи — Мултиплейър</h2>

  </div>

  <div id="or-text">— или —</div>

  <div class="l-row">
    <label>Код на стая:</label>
    <input type="text" id="room-input" placeholder="напр. 4829" maxlength="6" style="text-transform:uppercase;letter-spacing:4px;font-size:18px">
  </div>
  <button class="btn-purple" id="join-btn">🚪 Влез в стая</button>

  <div id="error-msg"></div>

  <!-- Waiting room -->
  <div id="waiting-room" style="display:none;width:100%;flex-direction:column;gap:10px">
    <div class="divider"></div>

    <div id="lobby-players"></div>
    <div id="lobby-status">Чакаме играчи... (мин. 1, макс. 4)</div>

      <div style="font-size:12px;color:#ffe0f0;font-weight:700">🤖 Добави роботи за останалите места:</div>
      <select id="bot-select" style="font-size:13px;padding:7px 10px;border:2px solid rgba(255,255,255,0.4);border-radius:10px;background:rgba(255,255,255,0.2);color:#fff;outline:none;width:100%">
        <option value="0">Без роботи</option>
        <option value="1">1 робот</option>

    </div>
    <button class="btn-yellow" id="start-btn" disabled>▶ Започни играта (само домакинът)</button>
  </div>
</div>

<!-- GAME -->
<div id="game-area">
  <div id="board-wrap">
    <div id="board"></div>
    <div id="center">
      <div id="logo"><span class="l1">MathCode</span><span class="l2">STARTUP PROJECT</span></div>
      <div id="players-area"></div>
      <div id="dice-row"><div class="die" id="d1">?</div><div class="die" id="d2">?</div></div>
      <div id="turn-label">Зареждане...</div>
      <div id="prop-info"></div>
      <div id="buy-bar"><button id="buy-btn">💼 Купи</button><button id="skip-btn">✖ Откажи</button></div>
      <button id="roll-btn" disabled>🎲 Хвърли зара</button>
      <div id="end-box"><h2 id="win-txt"></h2><button id="restart-btn">🔄 Нова игра</button></div>
    </div>
  </div>
  <div id="log-panel">
    <div id="log-title">📋 Хронология</div>
    <div id="log"></div>
  </div>
</div>

<div id="my-turn-banner">🎲 Твой ред е!</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-icon-wrap"></div>
    <div id="modal-name"></div>
    <div id="modal-price"></div>
    <div id="modal-coins">MATHCOINS</div>
    <div id="modal-desc"></div>
    <div id="modal-rent"></div>
    <div id="modal-owner"></div>
    <button id="modal-close">✕ Затвори</button>
  </div>
</div>

</div><!-- #app -->

const PILL={brown:"#8D6E63",lightblue:"#29B6F6",pink:"#EC407A",orange:"#FFA726",red:"#EF5350",yellow:"#FDD835",green:"#66BB6A",darkblue:"#1E88E5"};

// ── SVG ICONS ──
function svgRailroad(size=28){return `<svg width="${size}" height="${size}" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="15" fill="#7B2FBE" stroke="#fff" stroke-width="1.5"/><rect x="14.5" y="10" width="3" height="13" rx="1.5" fill="#fff"/><polygon points="16,5 11,10 21,10" fill="#F5C518"/><path d="M9 13 Q16 7 23 13" stroke="#4fc3f7" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M6 17 Q16 8 26 17" stroke="#4fc3f7" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/><line x1="16" y1="23" x2="11" y2="27" stroke="#fff" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="23" x2="21" y2="27" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>`;}
function svgCloud(size=28){return `<svg width="${size}" height="${size}" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="15" fill="#26C6DA" stroke="#fff" stroke-width="1.5"/><path d="M8 20 Q7 16 10 14 Q10 10 14 10 Q16 7 20 9 Q24 9 24 13 Q27 14 26 18 Q26 21 22 21 L10 21 Q7 22 8 20Z" fill="#fff" opacity="0.95"/><line x1="16" y1="24" x2="16" y2="17" stroke="#26C6DA" stroke-width="2" stroke-linecap="round"/><polyline points="13,20 16,17 19,20" stroke="#26C6DA" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}
function svgShield(size=28){return `<svg width="${size}" height="${size}" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="15" fill="#43A047" stroke="#fff" stroke-width="1.5"/><path d="M16 6 L24 10 L24 18 Q24 24 16 27 Q8 24 8 18 L8 10 Z" fill="#fff" opacity="0.9"/><rect x="13" y="17" width="6" height="5" rx="1" fill="#1a1a1a"/><path d="M13.5 17 Q13.5 13 16 13 Q18.5 13 18.5 17" stroke="#1a1a1a" stroke-width="2" fill="none"/><circle cx="16" cy="19.5" r="1" fill="#fff"/></svg>`;}

// ── SOCKET ──
const socket = io();
let myPlayerIndex = -1;
let myRoomCode = '';
let isHost = false;
let gameState = null;

// ── LOBBY LOGIC ──
function randomRoomCode(){return Math.floor(1000+Math.random()*9000).toString();}

document.getElementById('create-btn').addEventListener('click',()=>{
  const name = document.getElementById('player-name').value.trim();
  if(!name){showError('Въведи твоето име!');return;}
  const code = randomRoomCode();
  myRoomCode = code;
  isHost = true;
  socket.emit('join_room',{roomCode:code, playerName:name});
});

document.getElementById('join-btn').addEventListener('click',()=>{
  const name = document.getElementById('player-name').value.trim();
  const code = document.getElementById('room-input').value.trim().toUpperCase();
  if(!name){showError('Въведи твоето име!');return;}
  if(!code){showError('Въведи код на стая!');return;}
  myRoomCode = code;
  isHost = false;
  socket.emit('join_room',{roomCode:code, playerName:name});
});

document.getElementById('start-btn').addEventListener('click',()=>{
  const botCount = parseInt(document.getElementById('bot-select').value) || 0;
  socket.emit('start_game',{roomCode:myRoomCode, botCount});
});

socket.on('lobby_update',({players, count})=>{
  document.getElementById('waiting-room').style.display='flex';
  document.getElementById('room-code-show').textContent = myRoomCode;
  const lp = document.getElementById('lobby-players');
  lp.innerHTML = players.map((p,i)=>`<div class="lobby-player">${['🔴','🔵','🟢','🟡'][i]} ${p}${i===0?' 👑 (домакин)':''}</div>`).join('');
  document.getElementById('lobby-status').textContent = `${count}/4 играчи в стаята`;
  // Update bot options based on how many humans are in
  if(isHost){
    document.getElementById('bot-row').style.display='flex';
    const botSel = document.getElementById('bot-select');
    botSel.innerHTML = '';
    const maxBots = 4 - count;
    for(let i=0;i<=maxBots;i++){
      const opt=document.createElement('option');
      opt.value=i;opt.textContent=i===0?'Без роботи':`${i} робот${i>1?'а':''}`;
      botSel.appendChild(opt);
    }
    // Always allow start (at least 1 human)
    document.getElementById('start-btn').disabled = false;
  }
  myPlayerIndex = count - 1;
});

socket.on('error_msg',(msg)=>showError(msg));
function showError(msg){document.getElementById('error-msg').textContent=msg;setTimeout(()=>document.getElementById('error-msg').textContent='',3000);}

// ── GAME START ──
socket.on('game_started',(state)=>{
  gameState = state;
  document.getElementById('lobby').style.display='none';
  document.getElementById('game-area').classList.add('active');
  buildBoard();
  applyState(state);
});

socket.on('state_update',(state)=>{
  gameState = state;
  applyState(state);
});

// ── APPLY STATE ──
function applyState(state){
  renderPlayers(state);
  renderPawns(state);
  updateLog(state.log);

  const isMyTurn = state.current === myPlayerIndex;
  const phase = state.phase;

  document.getElementById('turn-label').textContent =
    `Ред на: ${state.players[state.current].emoji} ${state.players[state.current].name}`;

  // Roll button
  document.getElementById('roll-btn').disabled = !(isMyTurn && phase === 'roll');

  // Buy buttons
  const bb = document.getElementById('buy-btn');
  const sb = document.getElementById('skip-btn');
  if(isMyTurn && phase === 'buy'){
    const cell = BOARD[state.players[state.current].pos];
    document.getElementById('prop-info').textContent = `${cell.name.split('\n')[0]} — ${cell.price} MC. Купуваш?`;
    bb.style.display='inline-block'; sb.style.display='inline-block';
  } else {
    bb.style.display='none'; sb.style.display='none';
    if(phase==='roll') document.getElementById('prop-info').textContent='';
  }

  // My turn banner
  const banner = document.getElementById('my-turn-banner');
  if(isMyTurn && phase === 'roll'){
    banner.style.display='block';
    setTimeout(()=>banner.style.display='none',2500);
  }

  // Dice display
  if(state.lastRoll[0]){
    document.getElementById('d1').textContent = state.lastRoll[0];
    document.getElementById('d2').textContent = state.lastRoll[1];
  }

  // Check winner
  const alive = state.players.filter(p=>!p.bankrupt);
  if(alive.length===1){
    document.getElementById('roll-btn').style.display='none';
    document.getElementById('end-box').style.display='flex';
    document.getElementById('win-txt').textContent=`🏆 ${alive[0].name} СПЕЧЕЛИ!`;
  }
}

// ── ROLL ──
document.getElementById('roll-btn').addEventListener('click',()=>{
  document.getElementById('roll-btn').disabled=true;
  const d1e=document.getElementById('d1'),d2e=document.getElementById('d2');
  d1e.classList.add('rolling');d2e.classList.add('rolling');
  setTimeout(()=>{d1e.classList.remove('rolling');d2e.classList.remove('rolling');},400);
  socket.emit('roll_dice',{roomCode:myRoomCode});
});

document.getElementById('buy-btn').addEventListener('click',()=>{
  socket.emit('buy_property',{roomCode:myRoomCode, buy:true});
});
document.getElementById('skip-btn').addEventListener('click',()=>{
  socket.emit('buy_property',{roomCode:myRoomCode, buy:false});
});
document.getElementById('restart-btn').addEventListener('click',()=>location.reload());

// ── BOARD BUILD ──
function cellCoords(pos){
  if(pos<=10)return{row:10,col:10-pos};
  if(pos<=20)return{row:10-(pos-10),col:0};
  if(pos<=30)return{row:0,col:pos-20};
  return{row:pos-30,col:10};
}
function buildBoard(){
  const board=document.getElementById('board');board.innerHTML='';
  const grid=Array.from({length:11},()=>Array(11).fill(null));
  BOARD.forEach(c=>{const{row,col}=cellCoords(c.pos);grid[row][col]=c;});
  for(let r=0;r<11;r++){
    for(let c=0;c<11;c++){
      if(r>=1&&r<=9&&c>=1&&c<=9){board.appendChild(document.createElement('div'));continue;}
      const cell=grid[r][c];
      const div=document.createElement('div');
      div.className='cell'+(cell&&cell.type==='corner'?' corner':'');
      if(cell){
        div.id='cell-'+cell.pos;div.dataset.pos=cell.pos;
        div.addEventListener('click',()=>openModal(cell));
        if(cell.type==='prop'){
          const bar=document.createElement('div');
          bar.style.background=PILL[cell.color]||'#ccc';
          if(r===10)bar.className='color-bar-top';
          else if(r===0)bar.className='color-bar-bottom';
          else if(c===10)bar.className='color-bar-right';
          else bar.className='color-bar-left';
          const nm=document.createElement('div');nm.className='cell-name';nm.textContent=cell.name;
          const pr=document.createElement('div');pr.className='cell-price';pr.textContent=cell.price;
          const mc=document.createElement('div');mc.className='cell-mc';mc.textContent='MC';
          if(r===10){div.appendChild(bar);div.appendChild(nm);div.appendChild(pr);div.appendChild(mc);}
          else if(r===0){div.appendChild(nm);div.appendChild(pr);div.appendChild(mc);div.appendChild(bar);}
          else{div.appendChild(bar);div.appendChild(nm);div.appendChild(pr);div.appendChild(mc);}
        } else if(cell.type==='railroad'){
          const ic=document.createElement('div');ic.innerHTML=svgRailroad(30);ic.style.marginTop='4px';ic.style.flexShrink='0';
          const nm=document.createElement('div');nm.className='cell-name';nm.textContent=cell.name;
          const pr=document.createElement('div');pr.className='cell-price';pr.textContent=cell.price;
          const mc=document.createElement('div');mc.className='cell-mc';mc.textContent='MC';
          div.appendChild(ic);div.appendChild(nm);div.appendChild(pr);div.appendChild(mc);
        } else if(cell.type==='utility'){
          const ic=document.createElement('div');
          ic.innerHTML=cell.pos===28?svgCloud(30):svgShield(30);
          ic.style.marginTop='4px';ic.style.flexShrink='0';
          const nm=document.createElement('div');nm.className='cell-name';nm.textContent=cell.name;
          const pr=document.createElement('div');pr.className='cell-price';pr.textContent=cell.price;
          const mc=document.createElement('div');mc.className='cell-mc';mc.textContent='MC';
          div.appendChild(ic);div.appendChild(nm);div.appendChild(pr);div.appendChild(mc);
        } else {
          const nm=document.createElement('div');nm.className='cell-name';nm.textContent=cell.name;div.appendChild(nm);
          if(cell.price&&cell.fee==null){const pr=document.createElement('div');pr.className='cell-price';pr.textContent=cell.price;div.appendChild(pr);const mc=document.createElement('div');mc.className='cell-mc';mc.textContent='MC';div.appendChild(mc);}
          if(cell.fee!=null&&cell.fee>0){const pr=document.createElement('div');pr.className='cell-price';pr.style.background='#f48fb1';pr.textContent='-'+cell.fee;div.appendChild(pr);const mc=document.createElement('div');mc.className='cell-mc';mc.textContent='MC';div.appendChild(mc);}
          if(cell.fee!=null&&cell.fee<0){const pr=document.createElement('div');pr.className='cell-price';pr.style.background='#a5d6a7';pr.textContent='+'+(- cell.fee);div.appendChild(pr);const mc=document.createElement('div');mc.className='cell-mc';mc.textContent='MC';div.appendChild(mc);}
        }
        if(cell.type==='chance')div.classList.add('chance');
        if(cell.type==='chest')div.classList.add('chest');
        if(cell.type==='tax')div.classList.add('tax');
        if(cell.type==='railroad')div.classList.add('railroad');
        if(cell.type==='utility')div.classList.add('utility');
      }
      board.appendChild(div);
    }
  }
}

// ── PAWNS ──
function renderPawns(state){
  document.querySelectorAll('.pawn').forEach(p=>p.remove());
  state.players.forEach((pl,i)=>{
    const el=document.getElementById('cell-'+pl.pos);if(!el)return;
    const r=el.getBoundingClientRect(),br=document.getElementById('board-wrap').getBoundingClientRect();
    const ox=i%2===0?4:22,oy=i<2?4:22;
    const pw=document.createElement('div');pw.className='pawn';
    pw.style.background=pl.color;pw.textContent=pl.emoji;
    pw.style.left=(r.left-br.left+ox)+'px';pw.style.top=(r.top-br.top+oy)+'px';
    document.getElementById('board-wrap').appendChild(pw);
  });
}

// ── PLAYERS UI ──
function renderPlayers(state){
  const area=document.getElementById('players-area');area.innerHTML='';
  state.players.forEach((pl,i)=>{
    const card=document.createElement('div');card.className='pcard'+(i===state.current?' active-player':'');
    card.style.setProperty('--pc',pl.color);
    card.innerHTML=`<div class="pcard-name">${pl.emoji} ${pl.name}${i===myPlayerIndex?' (ти)':''}</div><div class="pcard-money">${pl.money} <span>MC</span></div><div class="pcard-pos">${BOARD[pl.pos].name.split('\n')[0]}</div>`;
    if(pl.bankrupt)card.style.opacity='0.4';
    area.appendChild(card);
  });
}

// ── LOG ──
let lastLogLen=0;
function updateLog(logArr){
  if(logArr.length===lastLogLen)return;
  lastLogLen=logArr.length;
  const l=document.getElementById('log');l.innerHTML='';
  logArr.forEach(msg=>{const p=document.createElement('p');p.textContent=msg;l.appendChild(p);});
}

// ── MODAL ──
function openModal(cell){
  const owner=gameState?gameState.players.find(p=>p.props.includes(cell.pos)):null;
  const iw=document.getElementById('modal-icon-wrap');
  if(cell.type==='railroad')iw.innerHTML=svgRailroad(54);
  else if(cell.type==='utility'&&cell.pos===28)iw.innerHTML=svgCloud(54);
  else if(cell.type==='utility'&&cell.pos===12)iw.innerHTML=svgShield(54);
  else if(cell.type==='prop')iw.innerHTML=`<div style="width:54px;height:18px;border-radius:12px;background:${PILL[cell.color]||'#ccc'};border:2px solid #1a1a1a;margin:0 auto"></div>`;
  else iw.innerHTML='';
  document.getElementById('modal-name').textContent=cell.name.replace('\n',' ');
  if(cell.price&&cell.fee==null){document.getElementById('modal-price').textContent=cell.price;document.getElementById('modal-coins').style.display='block';}
  else if(cell.fee!=null&&cell.fee>0){document.getElementById('modal-price').textContent='-'+cell.fee;document.getElementById('modal-coins').style.display='block';}
  else if(cell.fee!=null&&cell.fee<0){document.getElementById('modal-price').textContent='+'+(-cell.fee);document.getElementById('modal-coins').style.display='block';}
  else{document.getElementById('modal-price').textContent='';document.getElementById('modal-coins').style.display='none';}
  document.getElementById('modal-desc').textContent=cell.desc||'';
  document.getElementById('modal-rent').innerHTML=cell.rent?`<b>Наеми:</b> ${cell.rent.join(' / ')} MC`:'';
  document.getElementById('modal-owner').textContent=owner?`👤 Собственик: ${owner.name}`:(cell.type==='prop'||cell.type==='railroad'||cell.type==='utility'?'🟢 Свободен за купуване':'');
  document.getElementById('modal-overlay').classList.add('open');
}
document.getElementById('modal-close').addEventListener('click',()=>document.getElementById('modal-overlay').classList.remove('open'));
document.getElementById('modal-overlay').addEventListener('click',(e)=>{if(e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('open');});
</script>
</body>
</html>
